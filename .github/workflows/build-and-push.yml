name: Build, Scan and Push to ECR

on:
  push:
    paths:
      - "Dockerfile"
      - "**/*.go"
      - "**/*.txt"
      - "**/*.css"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.html"
      - "**/*.svg"
      - "**/*.json"
      - ".env*"
      - "src/**"
      - "public/**"

env:
  AWS_REGION: us-east-1
  ECR_REPO_NAME: nextclass-app-dev
  IMAGE_TAG: ${{ github.sha }}

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image (no push yet)
        run: |
          docker build \
            --build-arg BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }} \
            -t ${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }} \
            .

      # Trivy scan (warn only)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0 # WARN ONLY
          format: table

      # Ensure container runs as non-root
      - name: Check image user
        run: |
          USER=$(docker inspect --format='{{.Config.User}}' ${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }})
          echo "Container is running as: $USER"
          if [ -z "$USER" ] || [ "$USER" = "root" ] || [ "$USER" = "0" ]; then
            echo "Image is running as root or has no USER set!"
            exit 1
          fi

      - name: Tag image for ECR
        if: github.ref == 'refs/heads/main'
        run: |
          ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          docker tag ${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.ECR_REPO_NAME }}:latest
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Push Docker image to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_NAME }}:latest
