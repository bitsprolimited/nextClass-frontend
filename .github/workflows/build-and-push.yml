name: Build, Scan and Push to ECR

on:
  push:
    paths:
      - 'Dockerfile'
      - '**/*.py'

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: wiz-assessment-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image (no push yet)
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .

      # Trivy scan
      - name: Run Trivy vulnerability scanner
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} > trivy-report.txt || true

          echo "::group::Trivy Scan Report"
          cat trivy-report.txt
          echo "::endgroup::"

          if grep -q "CRITICAL\|HIGH" trivy-report.txt; then
            echo "::warning::Vulnerabilities found! Check the Trivy Scan Report above."
          fi


      # Ensure container runs as non-root
      - name: Check image user
        run: |
          USER=$(docker inspect --format='{{.Config.User}}' ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }})
          echo "Container is running as: $USER"
          if [ -z "$USER" ] || [ "$USER" = "root" ] || [ "$USER" = "0" ]; then
            echo "Image is running as root or has no USER set!"
            exit 1
          fi

      - name: Tag image for ECR
        if: github.ref == 'refs/heads/main'
        run: |
          ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.IMAGE_NAME }}:latest
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Push Docker image to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push $ECR_REGISTRY/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.IMAGE_NAME }}:latest
